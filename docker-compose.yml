# Quiz4Win — production compose
#
# Host-side nginx terminates TLS and proxies:
#   panel.quiz4win.com → 127.0.0.1:5800   (admin container, Next.js)
#   app.quiz4win.com   → 127.0.0.1:5801   (app container, static — Universal
#                                           Link manifests + reset-password
#                                           web fallback)
#   api.quiz4win.com   → 127.0.0.1:5802   (api container, Deno edge functions)
#
# Variables are read from the project-root .env file (see .env.docker.example).

services:
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* must be present at build time so Next.js inlines them
        # into the client bundle.
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-${NEXT_PUBLIC_SUPABASE_ANON_KEY}}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Quiz4Win Admin}
        NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${GOOGLE_RECAPTCHA_SITE_KEY:-}
        NEXT_PUBLIC_ADMIN_URL: ${NEXT_PUBLIC_ADMIN_URL:-}
    image: quiz4win-admin:latest
    container_name: quiz4win-admin
    restart: unless-stopped
    ports:
      - "127.0.0.1:5800:3000"
    environment:
      NODE_ENV: production
      # Public — runtime fallback (Next.js also reads them at runtime for server components).
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-${NEXT_PUBLIC_SUPABASE_ANON_KEY}}
      NEXT_PUBLIC_ADMIN_URL: ${NEXT_PUBLIC_ADMIN_URL:-}
      # Server-only.
      APP_URL: ${APP_URL:-https://app.quiz4win.com}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      # S3-compatible object storage (DigitalOcean Spaces).
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET: ${S3_SECRET}
      S3_ENDPOINT: ${S3_ENDPOINT}
      # LiveKit — server actions in the admin generate access tokens.
      LIVEKIT_SERVER_URL: ${LIVEKIT_SERVER_URL:-}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-}
      # Backend API base URL — admin server actions call edge functions through
      # this (e.g. admin-liveavatar for avatar/voice catalog). Defaults to the
      # in-network api service so traffic never leaves the Docker bridge.
      API_URL: ${API_URL:-http://api:8000}
    volumes:
      # Firebase service-account JSON — mounted read-only so the admin container
      # can load FCM credentials at runtime without embedding them in the image.
      - ./configs:/app/configs:ro
    networks:
      - quiz4win

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: quiz4win-app:latest
    container_name: quiz4win-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:5801:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - quiz4win

  db-maintainer:
    # Applies pending SQL migrations on every startup, runs a consistency
    # check, then schedules a daily pg_dump → gzip → upload to the S3
    # bucket. See deploy/db-maintainer/*.sh for the full logic.
    build:
      context: ./deploy/db-maintainer
      dockerfile: Dockerfile
    image: quiz4win-db-maintainer:latest
    container_name: quiz4win-db-maintainer
    restart: unless-stopped
    environment:
      # Direct Postgres connection string for psql / pg_dump.
      # Format: postgresql://postgres:<password>@db.<project>.supabase.co:5432/postgres
      SUPABASE_DB_URL: ${SUPABASE_DB_URL}
      MIGRATIONS_DIR: /migrations
      # Cron expression in UTC. Default: 02:00 every day.
      BACKUP_SCHEDULE: ${BACKUP_SCHEDULE:-0 2 * * *}
      # Run a backup immediately on container start (in addition to the cron).
      RUN_BACKUP_ON_START: ${RUN_BACKUP_ON_START:-false}
      # Days of history to keep both locally and in S3.
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      # S3-compatible storage (DigitalOcean Spaces) — reused from the api/admin services.
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET: ${S3_SECRET}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BACKUP_PREFIX: ${S3_BACKUP_PREFIX:-backups/postgres}
      TZ: UTC
    volumes:
      # Migrations are baked-in at deploy time. Mounted read-only so the
      # container cannot mutate them.
      - ./supabase/migrations:/migrations:ro
      # Local backup cache (also pruned daily by retention policy).
      - quiz4win-db-backups:/var/backups/quiz4win
    healthcheck:
      # /tmp/db-maintainer-ready is written by entrypoint.sh after the
      # migration + consistency steps complete successfully. The api
      # service waits on this via service_healthy.
      test: ["CMD", "test", "-f", "/tmp/db-maintainer-ready"]
      interval: 10s
      timeout: 3s
      retries: 30
      start_period: 5s
    networks:
      - quiz4win

  api:
    build:
      context: ./supabase/functions
      dockerfile: Dockerfile
    image: quiz4win-api:latest
    container_name: quiz4win-api
    # on-failure:5 — stops retrying after 5 consecutive crashes so a boot-loop
    # (e.g. AddrInUse) doesn't spin forever and fills the disk with logs.
    # Change to `unless-stopped` once the service is confirmed stable.
    restart: on-failure:5
    stop_grace_period: 15s
    depends_on:
      db-maintainer:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:5802:8000"
    environment:
      PORT: "8000"
      # Edge-function clients (_shared/supabase.ts) require these names.
      SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-${NEXT_PUBLIC_SUPABASE_ANON_KEY}}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      # User-facing app base URL (Expo Universal Link target for password-reset email).
      APP_URL: ${APP_URL:-https://app.quiz4win.com}
      # Where Supabase redirects after the signup email-confirmation link is
      # opened. Must be allow-listed in Supabase → Auth → URL Configuration.
      # Defaults to ${APP_URL}/auth/callback when unset (same /auth/* Universal
      # Link path the admin uses for all non-recovery generateLink flows).
      EMAIL_CONFIRM_REDIRECT_URL: ${EMAIL_CONFIRM_REDIRECT_URL:-}
      # Email (Brevo transactional API).
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@quiz4win.com}
      # Optional integrations — leave empty if unused.
      RECAPTCHA_SECRET_KEY: ${GOOGLE_RECAPTCHA_SECRET_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      APPLE_PAY_MERCHANT_ID: ${APPLE_PAY_MERCHANT_ID:-}
      # Remitation payment gateway (MasterCard + Crypto).
      REMITATION_ACCESS_KEY: ${REMITATION_ACCESS_KEY}
      REMITATION_SECRET_KEY: ${REMITATION_SECRET_KEY}
      REMITATION_BASE_URL: ${REMITATION_BASE_URL:-https://api.merchant.remitation.com/api/plugin}
      LIVEKIT_SERVER_URL: ${LIVEKIT_SERVER_URL:-}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-}
      LIVEKIT_WEBHOOK_SECRET: ${LIVEKIT_WEBHOOK_SECRET:-}
      # LiveAvatar (AI presenter catalog proxy). Leave empty to disable.
      LIVEAVATAR_API_URL: ${LIVEAVATAR_API_URL:-}
      LIVEAVATAR_API_KEY: ${LIVEAVATAR_API_KEY:-}
      # RabbitMQ — used to publish quiz.show.start and answer-persist events.
      RABBITMQ_URL: ${RABBITMQ_URL:-}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-}
      MQ_COMMAND_EXCHANGE: ${MQ_COMMAND_EXCHANGE:-}
      MQ_COMMAND_QUEUE: ${MQ_COMMAND_QUEUE:-quiz.show.start}
      MQ_ORCHESTRATOR_QUEUE: ${MQ_ORCHESTRATOR_QUEUE:-quiz.game.commands}
      # Redis — real-time game state (game-session edge function reads/writes).
      # NB: Docker Compose does NOT support nested ${...} inside ${VAR:-default}
      # — the inner ${REDIS_PASSWORD} gets mangled into a literal string. We
      # therefore build the URL with a single, flat expansion. To point at an
      # external Redis, edit this line directly (service-level `environment:`
      # wins over .env, so adding REDIS_URL to .env will NOT override this).
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      # S3-compatible object storage (DigitalOcean Spaces).
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET: ${S3_SECRET}
      S3_ENDPOINT: ${S3_ENDPOINT}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - quiz4win

  template-generator:
    # Wakes every minute: (1) generates games from active templates via RPC,
    # (2) detects upcoming games whose scheduled_at has arrived and publishes
    # StartGame to RabbitMQ so the game-orchestrator starts the Redis session.
    build:
      context: ./deploy/template-generator
      dockerfile: Dockerfile
    image: quiz4win-template-generator:latest
    container_name: quiz4win-template-generator
    restart: unless-stopped
    depends_on:
      db-maintainer:
        condition: service_healthy
    environment:
      SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      TEMPLATE_GEN_INTERVAL_MS: ${TEMPLATE_GEN_INTERVAL_MS:-60000}
      # RabbitMQ — publish StartGame when a scheduled game's time arrives.
      RABBITMQ_URL: ${RABBITMQ_URL:-}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-}
      MQ_COMMAND_EXCHANGE: ${MQ_COMMAND_EXCHANGE:-}
      MQ_ORCHESTRATOR_QUEUE: ${MQ_ORCHESTRATOR_QUEUE:-quiz.game.commands}
      # FCM — used by reminderTick() to push T-60/T-10/T-1 game-start reminders.
      FCM_SERVICE_ACCOUNT_PATH: ${FCM_SERVICE_ACCOUNT_PATH:-/app/configs/quiz4win-68443-firebase-adminsdk-fbsvc-24d33392b8.json}
      TZ: UTC
      # Debug log forwarding (shared with game-orchestrator)
      DEBUG_LOG_MQ: ${DEBUG_LOG_MQ:-false}
      DEBUG_LOG_QUEUE: ${DEBUG_LOG_QUEUE:-quiz4win.debug.logs}
    volumes:
      # Same read-only mount the admin container uses, so a single service-account
      # JSON powers both FCM senders.
      - ./configs:/app/configs:ro
    networks:
      - quiz4win

  # ─── Redis — real-time source of truth during active games (§2.1/§3.7) ────
  redis:
    image: redis:7-alpine
    container_name: quiz4win-redis
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - "${REDIS_PASSWORD}"
      - --maxmemory
      - 512mb
      - --maxmemory-policy
      - allkeys-lru
      - --save
      - ""
      - --appendonly
      - "no"
    ports:
      # Only bound to localhost — not exposed externally.
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - quiz4win

  # ─── Game Orchestrator — quiz session brain (§3.2) ──────────────────────────
  game-orchestrator:
    build:
      context: ./deploy/game-orchestrator
      dockerfile: Dockerfile
    image: quiz4win-game-orchestrator:latest
    container_name: quiz4win-game-orchestrator
    restart: unless-stopped
    depends_on:
      db-maintainer:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Redis (real-time game state). See note on the api service above: nested
      # ${...} inside a default value is unsupported by Compose, so we use a
      # single flat expansion. Edit this line directly to point at an external
      # Redis instance.
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      # RabbitMQ (command/event bus)
      RABBITMQ_URL: ${RABBITMQ_URL:-}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-}
      MQ_ORCHESTRATOR_QUEUE: ${MQ_ORCHESTRATOR_QUEUE:-quiz.game.commands}
      # Supabase (persistent DB writes)
      SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      # OpenAI (question generation — §5)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      # No-duplicate-question invariant: a question is never re-asked across the
      # platform until this cooldown elapses (default 7 days = 604800s). The
      # orchestrator re-rolls a fresh question on collision (claim_question RPC).
      QUESTION_REASK_COOLDOWN_SECONDS: ${QUESTION_REASK_COOLDOWN_SECONDS:-604800}
      QUESTION_DEDUP_MAX_RETRIES: ${QUESTION_DEDUP_MAX_RETRIES:-5}
      # LiveKit (broadcast — §3.5)
      LIVEKIT_SERVER_URL: ${LIVEKIT_SERVER_URL:-}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-}
      TZ: UTC
      # Debug log forwarding — set DEBUG_LOG_MQ=true to stream all logs to
      # the quiz4win.debug.logs RabbitMQ queue (run deploy/debug-consumer to read).
      DEBUG_LOG_MQ: ${DEBUG_LOG_MQ:-false}
      DEBUG_LOG_QUEUE: ${DEBUG_LOG_QUEUE:-quiz4win.debug.logs}
    networks:
      - quiz4win

  # ─── Service Monitor ────────────────────────────────────────────────────────
  monitor:
    # Deno container that runs health checks every MONITOR_INTERVAL_MS and
    # sends Brevo email alerts on any up→down / down→up transition.
    # See deploy/monitor/monitor.ts for the full list of checks.
    build:
      context: ./deploy/monitor
      dockerfile: Dockerfile
    image: quiz4win-monitor:latest
    container_name: quiz4win-monitor
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      # Supabase
      SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_DB_URL: ${SUPABASE_DB_URL:-}
      # Redis
      REDIS_URL: ${REDIS_URL:-}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # RabbitMQ
      RABBITMQ_URL: ${RABBITMQ_URL:-}
      # LiveKit
      LIVEKIT_SERVER_URL: ${LIVEKIT_SERVER_URL:-}
      # API in-network health URL
      API_HEALTH_URL: ${API_HEALTH_URL:-http://api:8000/health}
      # Brevo / alert settings
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@quiz4win.com}
      MONITOR_RECIPIENT: ${MONITOR_RECIPIENT:-majid.sadeghi.alavijeh@gmail.com}
      MONITOR_ENV: ${MONITOR_ENV:-production}
      MONITOR_INTERVAL_MS: ${MONITOR_INTERVAL_MS:-60000}
      MONITOR_TIMEOUT_MS: ${MONITOR_TIMEOUT_MS:-12000}
      MONITOR_REALERT_MS: ${MONITOR_REALERT_MS:-1800000}
      TZ: UTC
    networks:
      - quiz4win

networks:
  quiz4win:
    driver: bridge

volumes:
  quiz4win-db-backups:
    driver: local
