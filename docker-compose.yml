# Quiz4Win — production compose
#
# Host-side nginx terminates TLS and proxies:
#   panel.quiz4win.com → 127.0.0.1:5800   (admin container, Next.js)
#   app.quiz4win.com   → 127.0.0.1:5801   (app container, static — Universal
#                                           Link manifests + reset-password
#                                           web fallback)
#   api.quiz4win.com   → 127.0.0.1:5802   (api container, Deno edge functions)
#
# Variables are read from the project-root .env file (see .env.docker.example).

services:
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* must be present at build time so Next.js inlines them
        # into the client bundle.
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-${NEXT_PUBLIC_SUPABASE_ANON_KEY}}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Quiz4Win Admin}
        NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${GOOGLE_RECAPTCHA_SITE_KEY:-}
        NEXT_PUBLIC_ADMIN_URL: ${NEXT_PUBLIC_ADMIN_URL:-}
    image: quiz4win-admin:latest
    container_name: quiz4win-admin
    restart: unless-stopped
    ports:
      - "127.0.0.1:5800:3000"
    environment:
      NODE_ENV: production
      # Public — runtime fallback (Next.js also reads them at runtime for server components).
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-${NEXT_PUBLIC_SUPABASE_ANON_KEY}}
      NEXT_PUBLIC_ADMIN_URL: ${NEXT_PUBLIC_ADMIN_URL:-}
      # Server-only.
      APP_URL: ${APP_URL:-https://app.quiz4win.com}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      # S3-compatible object storage (DigitalOcean Spaces).
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET: ${S3_SECRET}
      S3_ENDPOINT: ${S3_ENDPOINT}
    networks:
      - quiz4win

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: quiz4win-app:latest
    container_name: quiz4win-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:5801:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - quiz4win

  api:
    build:
      context: ./supabase/functions
      dockerfile: Dockerfile
    image: quiz4win-api:latest
    container_name: quiz4win-api
    # on-failure:5 — stops retrying after 5 consecutive crashes so a boot-loop
    # (e.g. AddrInUse) doesn't spin forever and fills the disk with logs.
    # Change to `unless-stopped` once the service is confirmed stable.
    restart: on-failure:5
    stop_grace_period: 15s
    ports:
      - "127.0.0.1:5802:8000"
    environment:
      PORT: "8000"
      # Edge-function clients (_shared/supabase.ts) require these names.
      SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-${NEXT_PUBLIC_SUPABASE_ANON_KEY}}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      # User-facing app base URL (Expo Universal Link target for password-reset email).
      APP_URL: ${APP_URL:-https://app.quiz4win.com}
      # Optional integrations — leave empty if unused.
      RECAPTCHA_SECRET_KEY: ${GOOGLE_RECAPTCHA_SECRET_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      APPLE_PAY_MERCHANT_ID: ${APPLE_PAY_MERCHANT_ID:-}
      LIVEKIT_SERVER_URL: ${LIVEKIT_SERVER_URL:-}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-}
      LIVEKIT_WEBHOOK_SECRET: ${LIVEKIT_WEBHOOK_SECRET:-}
      # S3-compatible object storage (DigitalOcean Spaces).
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET: ${S3_SECRET}
      S3_ENDPOINT: ${S3_ENDPOINT}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - quiz4win

networks:
  quiz4win:
    driver: bridge
