# ─── panel.quiz4win.com — Quiz4Win Admin Panel ───────────────────────────────
# HTTP → HTTPS redirect (managed by certbot / setup.sh)
server {
    listen 80;
    listen [::]:80;
    server_name panel.quiz4win.com;

    # Let's Encrypt webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — proxy to Docker admin container on port 5800
server {
    listen 443 ssl http2;
    listen [::]:443 ssl;
    server_name panel.quiz4win.com;

    # ── TLS (populated by certbot) ──────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/panel.quiz4win.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/panel.quiz4win.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            DENY                                           always;
    add_header X-Content-Type-Options     nosniff                                        always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"              always;

    # ── Proxy ───────────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:5800;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Next.js server-sent events / streaming responses
        proxy_buffering    off;
        proxy_read_timeout 300s;

        # Image uploads (icon / thumbnail / host avatar) flow through Next.js
        # server actions before being forwarded to the api. The default 1M
        # would 413 anything larger than a small thumbnail.
        client_max_body_size 50M;

        # ── Cache control ────────────────────────────────────────────────────
        # Disable nginx proxy cache entirely for the admin panel so that every
        # deployment is visible immediately without clearing the nginx cache.
        proxy_cache        off;
        proxy_no_cache     1;
        proxy_cache_bypass 1;

        # Tell the browser (and any intermediate proxy/CDN) not to cache either.
        # Next.js already sends these headers; add_header here ensures they reach
        # the browser even if an intermediate hop strips them.
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma        "no-cache"                            always;
        add_header Expires       "0"                                   always;
    }

    # ── Static assets ────────────────────────────────────────────────────────
    # _next/static files are content-addressed (hash in filename) by Next.js,
    # so they are safe to cache long-term in the browser.
    location /_next/static/ {
        proxy_pass         http://127.0.0.1:5800;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_cache        off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }
}
