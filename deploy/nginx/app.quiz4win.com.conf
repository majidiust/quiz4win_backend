# ─── app.quiz4win.com — Quiz4Win User App ────────────────────────────────────
# HTTP → HTTPS redirect (managed by certbot / setup.sh)
server {
    listen 80;
    listen [::]:80;
    server_name app.quiz4win.com;

    # Let's Encrypt webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — proxy to Docker app container on port 5801
server {
    listen 443 ssl http2;
    listen [::]:443 ssl;
    server_name app.quiz4win.com;

    # ── TLS (populated by certbot) ──────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/app.quiz4win.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.quiz4win.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options     nosniff                                        always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"              always;

    # ── Proxy → quiz4win-app container (127.0.0.1:5801) ─────────────────────
    # The container serves both:
    #   /.well-known/apple-app-site-association  (iOS Universal Link)
    #   /.well-known/assetlinks.json             (Android App Link)
    #   /auth/reset-password                     (web fallback)
    #   /                                        (landing → app stores)
    # See app/Dockerfile and app/nginx.conf.
    location / {
        proxy_pass         http://127.0.0.1:5801;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Streaming / server-sent events support
        proxy_buffering    off;
        proxy_read_timeout 300s;
    }
}
