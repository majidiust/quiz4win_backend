# ─── api.quiz4win.com — Quiz4Win Edge Functions API ──────────────────────────
# HTTP → HTTPS redirect (managed by certbot / setup.sh)
server {
    listen 80;
    listen [::]:80;
    server_name api.quiz4win.com;

    # Let's Encrypt webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — proxy to Docker API container on port 5802
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.quiz4win.com;

    # ── TLS (populated by certbot) ──────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.quiz4win.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.quiz4win.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options     nosniff                                        always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"              always;

    # ── CORS preflight (handled by each edge function, but nginx fast-paths OPTIONS) ──
    if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin  "*";
        add_header Access-Control-Allow-Methods "GET, POST, PATCH, PUT, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Client-Info, apikey";
        add_header Access-Control-Max-Age       86400;
        add_header Content-Length               0;
        add_header Content-Type                 text/plain;
        return 204;
    }

    # ── Proxy ───────────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:5802;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Edge functions may stream SSE responses
        proxy_buffering    off;
        proxy_read_timeout 300s;

        # Raise body limit to support file uploads via edge functions
        client_max_body_size 50M;
    }

    # ── Health check (public, no auth) ──────────────────────────────────────
    location = /health {
        proxy_pass         http://127.0.0.1:5802/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log         off;
    }
}
