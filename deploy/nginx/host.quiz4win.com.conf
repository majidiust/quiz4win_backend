# ─── host.quiz4win.com — Quiz4Win Host Dashboard ─────────────────────────────
# HTTP → HTTPS redirect (managed by certbot / setup.sh)
server {
    listen 80;
    listen [::]:80;
    server_name host.quiz4win.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — proxy to Docker host-app container on port 5803
server {
    listen 443 ssl http2;
    listen [::]:443 ssl;
    server_name host.quiz4win.com;

    ssl_certificate     /etc/letsencrypt/live/host.quiz4win.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/host.quiz4win.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            DENY                                           always;
    add_header X-Content-Type-Options     nosniff                                        always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"              always;

    location / {
        proxy_pass         http://127.0.0.1:5803;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_buffering    off;
        proxy_read_timeout 300s;

        # Verification document uploads pass through Next.js server actions.
        client_max_body_size 50M;

        proxy_cache        off;
        proxy_no_cache     1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma        "no-cache"                            always;
        add_header Expires       "0"                                   always;
    }

    location /_next/static/ {
        proxy_pass         http://127.0.0.1:5803;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache        off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }
}
