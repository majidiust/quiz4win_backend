# Internal nginx config for the app.quiz4win.com static container.
# Listens on 8080; host nginx proxies 443 → 127.0.0.1:5801 → here.

server {
    listen 8080 default_server;
    server_name _;
    root /usr/share/nginx/html;

    # Hide nginx version
    server_tokens off;

    # ── Health check ─────────────────────────────────────────────────────────
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ── Universal Link / App Link manifests (must be application/json) ───────
    # iOS expects no extension; Apple is strict about the content-type.
    location = /.well-known/apple-app-site-association {
        default_type application/json;
        add_header Cache-Control "public, max-age=3600";
        try_files /.well-known/apple-app-site-association =404;
    }
    location = /.well-known/assetlinks.json {
        default_type application/json;
        add_header Cache-Control "public, max-age=3600";
        try_files /.well-known/assetlinks.json =404;
    }

    # ── Auth web fallbacks (Universal Link miss) ─────────────────────────────
    # These pages load only when the mobile app is NOT installed and iOS/Android
    # cannot intercept the /auth/* Universal Link. The fragment tokens
    # (#access_token=…&type=…) are read client-side by the static HTML.

    # Signup email-confirmation callback (type=signup).
    location = /auth/callback {
        try_files /auth/callback.html =404;
        add_header Cache-Control "no-store, must-revalidate";
    }

    # Password-reset callback (type=recovery).
    location = /auth/reset-password {
        try_files /auth/reset-password.html =404;
        add_header Cache-Control "no-store, must-revalidate";
    }

    # ── Payment success/failure redirect ─────────────────────────────────────
    # Used by Remitation/Stripe as the return URL.
    location = /pay/return {
        try_files /pay/return.html =404;
        add_header Cache-Control "no-store, must-revalidate";
    }

    # ── Static assets ───────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff"                       always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options        "DENY"                          always;
}
